<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed | Blinders Power Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --card: #161b22; --border: rgba(255,255,255,0.08);
      --white: #f0f6fc; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; max-width: 460px; width: 100%; text-align: center; }
    .icon { width: 64px; height: 64px; background: rgba(63,185,80,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon svg { width: 32px; height: 32px; stroke: var(--green); }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; }
    .order-id { font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; }
    .order-id span { color: var(--accent); font-weight: 600; }
    p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 32px; }
    a { display: inline-block; background: var(--accent); color: #0d1117; font-weight: 700; font-size: 0.9rem; padding: 12px 28px; border-radius: 8px; text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.85; }
    .logo { position: fixed; top: 20px; left: 24px; font-size: 0.95rem; font-weight: 700; color: var(--white); text-decoration: none; }
    .logo span { color: var(--accent); }
  </style>
</head>
<body>
  <a class="logo" href="/"><span>Blinders </span>Power Group</a>

  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <h1>Payment Confirmed!</h1>
    <p class="order-id">Order <span id="order-num"></span></p>
    <p>Thank you for your purchase. You'll receive a confirmation email shortly with your order details and shipping information.</p>
    <a href="/">Continue Shopping</a>
  </div>

  <script>
    // Show order ID from URL param
    const params  = new URLSearchParams(window.location.search);
    const orderId = params.get('order_id');
    if (orderId) document.getElementById('order-num').textContent = orderId;

    // Clear cart (in case it wasn't cleared before redirect)
    localStorage.removeItem('novamart-cart');
  </script>
</body>
</html>
